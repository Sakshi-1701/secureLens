# Server
server.port=8080

# Static files (frontend build)
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# Multipart file upload configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.enabled=true

# Database (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/hackathon_db
spring.datasource.username=##DB_USERNAME##
spring.datasource.password=##DB_PASSWORD##
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Mail (Gmail SMTP example)
spring.mail.host=##SMTP_HOST##
spring.mail.port=##SMTP_PORT##
spring.mail.username=##SMTP_USERNAME##
spring.mail.password=##SMTP_PASSWORD##
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File storage
vigil.storage.base-dir=${user.home}/vigil-uploads

# OpenRouter Configuration
openrouter.api.key=##OPEN_ROUTER_API_KEY##
openrouter.base.url=https://openrouter.ai/api/v1

# Logging configuration
logging.level.com.vigil=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n


